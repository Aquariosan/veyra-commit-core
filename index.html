          "@type": "Question",
          "name": "What is Veyra?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Veyra is the standard commit layer for production AI agent writes. It provides free trust discovery and verification, charging only when actions settle. It defines the transition from Explore Mode (read, search, simulate) to Commit Mode (write, send, deploy, delete). Connect via MCP Pack at https://mcp.veyra.to/sse for 48 tools in one endpoint."
          }
        },
        {
          "@type": "Question",
          "name": "How do AI agents use Veyra?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI agents call checkTrustStatus() to discover if a tool requires commit mode, then authorizeAction() to get a token, execute the write with the X-Veyra-Token header, and submitReceipt() for settlement. If a tool returns VeyraCommitRequired, the agent automatically authorizes and retries. Or connect to the MCP Pack at https://mcp.veyra.to/sse for all tools with one URL."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Veyra MCP Pack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Veyra MCP Pack is a hosted MCP endpoint at https://mcp.veyra.to/sse that provides 48 tools: 24 free read tools and 24 protected write tools. Connect from Claude Desktop, Cursor, OpenAI Codex, Windsurf, Cline, or any MCP-compatible client with one URL."
          }
        },
        {
          "@type": "Question",
          "name": "What is VeyraCommitRequired?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "VeyraCommitRequired is a machine-readable error returned by tools that require commit mode. It includes the authorize endpoint, verify endpoint, and retry strategy, allowing AI agents to automatically recover and retry the write through Veyra."
          }
        },
        {
          "@type": "Question",
          "name": "Is Veyra free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trust discovery, token verification, and all 24 read tools are free forever. Veyra charges only for settlement of productive writes: €0.005 for low-risk writes (Class A) up to €0.25 for cross-org writes (Class D)."
          }
        },
        {
          "@type": "Question",
          "name": "How do I connect to Veyra MCP Pack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude Desktop: add {\"mcpServers\":{\"veyra\":{\"url\":\"https://mcp.veyra.to/sse\"}}} to config. Cursor: Settings → MCP → Add Server → https://mcp.veyra.to/sse. OpenAI Codex: MCP Server URL → https://mcp.veyra.to/sse. Any MCP client: connect to https://mcp.veyra.to/sse."
          }
        },
        {
          "@type": "Question",
          "name": "What integration patterns does Veyra provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Three core patterns: requireTrustedWrite() for tool builders to protect write endpoints, commitAwareFetch() for agent developers as a drop-in fetch wrapper with automatic commit mode, and handleCommitRequired() for auto-recovery when tools return VeyraCommitRequired."
          }
        }
      ]
