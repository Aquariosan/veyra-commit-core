          "name": "What is Veyra?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Veyra is the standard commit layer for production AI agent writes. It provides free trust discovery and verification, charging only when actions settle. It defines the transition from Explore Mode (read, search, simulate) to Commit Mode (write, send, deploy, delete)."
          }
        },
        {
          "@type": "Question",
          "name": "How do AI agents use Veyra?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI agents call checkTrustStatus() to discover if a tool requires commit mode, then authorizeAction() to get a token, execute the write with the X-Veyra-Token header, and submitReceipt() for settlement. If a tool returns VeyraCommitRequired, the agent automatically authorizes and retries."
          }
        },
        {
          "@type": "Question",
          "name": "What is VeyraCommitRequired?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "VeyraCommitRequired is a machine-readable error returned by tools that require commit mode. It includes the authorize endpoint, verify endpoint, and retry strategy, allowing AI agents to automatically recover and retry the write through Veyra."
          }
        },
        {
          "@type": "Question",
          "name": "Is Veyra free?",
          "acceptedAnswer": {
