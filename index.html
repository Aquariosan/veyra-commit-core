    <meta name="author" content="Veyra" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://veyra.to/" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Veyra — Commit Mode for AI Agent Actions">
    <meta property="og:description" content="Commit mode for production AI agent actions. 48 MCP tools, one URL. Free reads. Protected writes.">
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://veyra.to/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Veyra — Commit Mode for AI Agent Actions">
    <meta name="twitter:description" content="Commit mode for production AI agent actions. 48 MCP tools, one URL. Free reads. Protected writes.">
    <meta name="twitter:image" content="https://veyra.to/og-image.png">

    <!-- Machine-readable discovery -->
    <link rel="alternate" type="application/json" href="https://veyra.to/openapi.json" title="OpenAPI Specification" />
    <link rel="alternate" type="text/plain" href="https://veyra.to/llms.txt" title="LLM-readable documentation" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Veyra",
      "description": "Commit mode for production AI agent actions. 48 MCP tools in one endpoint. Free reads. Protected writes. Settlement-based pricing.",
      "url": "https://veyra.to",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "softwareVersion": "2.4.1",
      "downloadUrl": "https://www.npmjs.com/package/@veyrahq/sdk-node",
      "offers": [
        { "@type": "Offer", "name": "Read tools", "price": "0", "priceCurrency": "EUR", "description": "24 free read tools via MCP Pack" },
        { "@type": "Offer", "name": "Class A Settlement", "price": "0.005", "priceCurrency": "EUR", "description": "Low-risk writes" },
        { "@type": "Offer", "name": "Class B Settlement", "price": "0.02", "priceCurrency": "EUR", "description": "Business-critical writes" },
        { "@type": "Offer", "name": "Class C Settlement", "price": "0.10", "priceCurrency": "EUR", "description": "High-risk writes" },
        { "@type": "Offer", "name": "Class D Settlement", "price": "0.25", "priceCurrency": "EUR", "description": "Cross-org writes" }
      ],
      "author": {
        "@type": "Organization",
        "name": "Veyra",
        "url": "https://veyra.to",
        "sameAs": ["https://github.com/Aquariosan/veyra", "https://www.npmjs.com/package/@veyrahq/sdk-node"]
      }
    }
    </script>

    <!-- JSON-LD: WebAPI -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebAPI",
      "name": "Veyra Commit Mode API",
      "description": "REST API for AI agent commit mode. Trust discovery, action authorization, token verification, and settlement. Base URL: https://api.veyra.to/v1",
      "url": "https://api.veyra.to/v1",
      "documentation": "https://veyra.to/docs",
      "provider": { "@type": "Organization", "name": "Veyra", "url": "https://veyra.to" }
    }
    </script>

    <!-- JSON-LD: WebApplication (MCP Pack) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Veyra MCP Pack",
      "description": "48 MCP tools in one SSE endpoint. 24 free reads, 24 protected writes. Connect from Claude Desktop, Cursor, OpenAI Codex, Windsurf, Cline, or any MCP client.",
      "url": "https://mcp.veyra.to/sse",
      "applicationCategory": "DeveloperApplication",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR", "description": "24 free read tools. Protected writes billed per settlement." },
      "author": { "@type": "Organization", "name": "Veyra", "url": "https://veyra.to" }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Veyra?",
          "acceptedAnswer": { "@type": "Answer", "text": "Veyra is commit mode for production AI agent actions. It provides authorization, verification, and settlement for writes. Discovery and verification are free. Connect via MCP Pack at https://mcp.veyra.to/sse for 48 tools." }
        },
        {
          "@type": "Question",
          "name": "What is the Veyra MCP Pack?",
          "acceptedAnswer": { "@type": "Answer", "text": "A hosted MCP endpoint at https://mcp.veyra.to/sse with 48 tools: 24 free reads and 24 protected writes across 8 tool domains. Connect from Claude Desktop, Cursor, OpenAI Codex, Windsurf, Cline, or any MCP client." }
        },
        {
          "@type": "Question",
          "name": "Is Veyra free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Trust discovery, token verification, and all 24 read tools are free. Settlement is billed per action: €0.005 (Class A) to €0.25 (Class D)." }
        },
        {
          "@type": "Question",
          "name": "What is VeyraCommitRequired?",
          "acceptedAnswer": { "@type": "Answer", "text": "A machine-readable error returned by tools that require commit mode. It includes the authorize endpoint and retry strategy, enabling agents to automatically recover and retry." }
        }
      ]
    }
    </script>

    <!-- JSON-LD: ItemList (Reference Tools) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Veyra Reference Tools",
      "description": "8 MCP tool domains built on the Veyra commit pattern. Reads free, writes require commit mode.",
      "numberOfItems": 8,
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "item": { "@type": "SoftwareApplication", "name": "veyra-memory", "description": "Persistent key-value store" }},
        { "@type": "ListItem", "position": 2, "item": { "@type": "SoftwareApplication", "name": "veyra-notes", "description": "Note-taking with tags" }},
        { "@type": "ListItem", "position": 3, "item": { "@type": "SoftwareApplication", "name": "veyra-tasks", "description": "Task management" }},
        { "@type": "ListItem", "position": 4, "item": { "@type": "SoftwareApplication", "name": "veyra-snippets", "description": "Code snippet storage" }},
        { "@type": "ListItem", "position": 5, "item": { "@type": "SoftwareApplication", "name": "veyra-bookmarks", "description": "Bookmark manager" }},
        { "@type": "ListItem", "position": 6, "item": { "@type": "SoftwareApplication", "name": "veyra-contacts", "description": "Contact management" }},
        { "@type": "ListItem", "position": 7, "item": { "@type": "SoftwareApplication", "name": "veyra-forms", "description": "Form builder" }},
        { "@type": "ListItem", "position": 8, "item": { "@type": "SoftwareApplication", "name": "veyra-webhooks", "description": "Webhook sender" }}
      ]
    }
    </script>
</head>

  <body>
    <div id="root"></div>

</html>
